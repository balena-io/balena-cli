services:
  service1:
    build:
      context: ./service1
    extends:
      file: base.yml
      service: base
    annotations:
      com.example.foo: bar
    attach: false
    cgroup: host
    cpu_rt_runtime: 400
    cpu_rt_period: 1000
    cpus: 0.5
    device_cgroup_rules:
      - 'c 1:3 mr'
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "echo", "ok"]
      start_interval: 5s
      start_period: 30s
    ipc: shareable
    label_file:
      - labels.txt
    pids_limit: 100
    post_start:
      - command: echo post-start
    pre_stop:
      - command: echo pre-stop
    read_only: true
    uts: host
    networks:
      custom_network:
        aliases:
          - alias1
        ipv4_address: 172.16.0.10
        ipv6_address: "fd00::10"
        mac_address: "02:42:ac:11:00:02"
        driver_opts:
          com.docker.network.endpoint: "0.0.0.0"
        gw_priority: 100
        priority: 1000
  service2:
    build:
      context: ./service2
      dockerfile: Dockerfile-alt
    network_mode: "service:service1"
    pid: "service:service1"
    volumes_from:
      - service1

networks:
  custom_network:
    ipam:
      config:
        - subnet: 172.16.0.0/24
